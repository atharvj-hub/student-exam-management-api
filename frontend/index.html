<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic Intelligence — React</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="entry.css">

  <!-- GSAP motion engine + ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-trail>
  <div id="root"></div>

  <!-- auth + api + motion layers (plain scripts, run first) -->
  <script src="auth.js?v=2"></script>
  <script src="api.js?v=2"></script>
  <script src="motion.js?v=2"></script>
  <script src="login-machine.js?v=2"></script>

  <!-- React UI layer (Babel-transpiled, in dependency order) -->
  <script type="text/babel" src="helpers.jsx?v=2"></script>
  <script type="text/babel" src="views-a.jsx?v=2"></script>
  <script type="text/babel" src="views-b.jsx?v=2"></script>
  <script type="text/babel" src="app.jsx?v=2"></script>

  <!-- Entry experience: intro, auth, router (mounts the app) -->
  <script type="text/babel" src="entry-auth.jsx?v=2"></script>
  <script type="text/babel" src="entry.jsx?v=2"></script>
</body>
</html>
