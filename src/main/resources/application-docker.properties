# ═══════════════════════════════════════════════════════════════════
# application-docker.properties — Docker Profile
# ═══════════════════════════════════════════════════════════════════
#
# Active when: SPRING_PROFILES_ACTIVE=docker
# Set in docker-compose.yml as an environment variable.
#
# KEY DIFFERENCE from default:
#   localhost → postgres (Docker Compose service name)
#
# In Docker, containers communicate via internal DNS.
# The PostgreSQL container is named "postgres" in docker-compose.yml.
# From the app container's perspective, the DB host is "postgres", not localhost.
# localhost in a Docker container = the container itself, not your machine.

spring.datasource.url=jdbc:postgresql://postgres:5432/student_exam_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# Less verbose logging in Docker environment
spring.jpa.show-sql=false
logging.level.com.internship.student_exam_api=INFO