# ═══════════════════════════════════════════════════════════════════
# application-test.properties — Test Profile
# ═══════════════════════════════════════════════════════════════════
#
# Active when: @ActiveProfiles("test") in test classes
# Uses H2 in-memory database — no external PostgreSQL needed.
# Tests run fast, isolated, with clean state per test class.

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Flyway for tests — Hibernate creates schema from entities
spring.flyway.enabled=false

spring.jpa.show-sql=true
spring.jackson.serialization.write-dates-as-timestamps=false

