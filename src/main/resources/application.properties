spring.profiles.default=dev

# Jackson — explicitly document the deserialization contract.
# FAIL_ON_UNKNOWN_PROPERTIES=false (default): extra fields in JSON payloads
# are silently ignored. This is intentional for ResultUpdateRequest — if a
# consumer mistakenly sends studentId in a PUT body, it is safely ignored.
# Change to true only if strict payload validation is required globally.
spring.jackson.deserialization.fail-on-unknown-properties=false
