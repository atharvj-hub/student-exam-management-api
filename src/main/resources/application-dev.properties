# ============================================================================
# Student Exam API - Main Configuration
# ============================================================================

spring.application.name=student-exam-api

# ============================================================================
# Server
# ============================================================================

server.port=8080

# ============================================================================
# PostgreSQL Database
# ============================================================================

spring.datasource.url=jdbc:postgresql://localhost:5432/student_dev
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================================
# Hikari Connection Pool
# ============================================================================

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ============================================================================
# JPA / Hibernate
# ============================================================================

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================================
# Flyway
# ============================================================================

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ============================================================================
# Logging
# ============================================================================

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================================================
# Jackson
# ============================================================================

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ============================================================================
# JWT Configuration
# ============================================================================
jwt.secret=${JWT_SECRET:7a6b5c4d3e2f1a0b9c8d7e6f5a4b3c2d1e0f9a8b7c6d5e4f3a2b1c0d9e8f7a6b}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# ============================================================================
# Actuator — dev: health, info, metrics only
# ============================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always