# ============================================================================
# Student Exam API - Main Configuration
# ============================================================================

spring.application.name=student-exam-api

# ============================================================================
# Server
# ============================================================================

server.port=8080

# ============================================================================
# PostgreSQL Database
# ============================================================================

spring.datasource.url=jdbc:postgresql://localhost:5432/student_dev
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================================
# Hikari Connection Pool
# ============================================================================

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ============================================================================
# JPA / Hibernate
# ============================================================================

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================================
# Flyway
# ============================================================================

spring.flyway.enabled=true
# dev adds db/seed (demo data) on top of db/migration; prod loads migration only
spring.flyway.locations=classpath:db/migration,classpath:db/seed
spring.flyway.baseline-on-migrate=true

# ============================================================================
# Logging
# ============================================================================

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# Surface the content-addressed cache hash on hit/miss (dev observability)
logging.level.com.internship.student_exam_api.service.StudentInsightService=DEBUG

# ============================================================================
# Jackson
# ============================================================================

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ============================================================================
# JWT Configuration
# ============================================================================
# Dev-only fallback so `IntelliJ Run` (dev profile) works with no env setup.
# This is a THROWAWAY demo secret — it is intentionally obvious and must never
# reach production. application-prod.properties and application-docker.properties
# deliberately have NO fallback (`${JWT_SECRET}`), so any real deployment still
# fails fast if the secret is unset. JwtUtil accepts this raw string directly
# (>=32 bytes -> valid HS256 key); no Base64 encoding required.
jwt.secret=${JWT_SECRET:development-demo-secret-change-before-production}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# ============================================================================
# Actuator — dev: health, info, metrics only
# ============================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ============================================================================
# Spring AI / Ollama Configuration
# ============================================================================
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=qwen3:8b
spring.ai.ollama.chat.options.temperature=0.2
# Force valid-JSON output so the structured-output converter can parse the
# response (qwen3 otherwise wraps the answer in reasoning prose -> null fields).
spring.ai.ollama.chat.options.format=json

# AI HTTP client timeouts (applied via RestClientCustomizer in AiConfig).
# read-timeout bounds how long a servlet thread can block on a hung model call;
# on expiry the call surfaces as 503 (AiProviderUnavailableException) instead of
# pinning the thread indefinitely. Reasoning is disabled (/no_think) so even a
# cold qwen3:8b generation completes well inside the read window.
app.ai.connect-timeout-ms=5000
app.ai.read-timeout-ms=120000

# ============================================================================
# Rate Limiting
# ============================================================================
# Login: 5 attempts/min per IP (brute-force protection)
app.rate-limit.capacity=5
# Analytics: 20 requests/min per IP (shared by summary + insights endpoints)
app.rate-limit.analytics-capacity=20